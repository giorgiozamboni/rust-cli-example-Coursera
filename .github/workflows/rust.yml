name: Rust Collaborator CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Fondamentale: diamo al robot il permesso di scrivere nel repository
permissions:
  contents: write

jobs:
  style-and-fix:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout del codice
        uses: actions/checkout@v4
        with:
          # Questo permette al robot di caricare le modifiche correttamente
          ref: ${{ github.head_ref }}

      - name: 2. Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 3. Correzione Automatica (fmt)
        # Qui usiamo 'cargo fmt' senza '--check' perché vogliamo che modifichi i file
        run: cargo fmt --all

      - name: 4. Controllo Qualità (Clippy)
        # Clippy segnala errori logici; questi è meglio vederli nel log
        run: cargo clippy -- -D warnings

      - name: 5. Applica le correzioni
        # Se cargo fmt ha cambiato qualcosa, questo step crea un commit automatico
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Robot: Ho sistemato la formattazione del codice"
